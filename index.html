<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Live Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b14;
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  background:#0f2f22;
  color:#00ff99;
  font-size:26px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#123f30;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{cursor:pointer;}

.green{background:#00ff99;}
.red{background:#ff3b3b;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #1f5c45;
  padding:8px;
  text-align:center;
}

th{
  background:#0f2f22;
  color:#00ff99;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">🃏 CASINO LIVE TABLE</div>

<div class="container">

<div class="card" id="loginBox">
  <h3>🎲 Entra al Tavolo</h3>
  <input id="name" placeholder="Nome giocatore">
  <button class="green" onclick="login()">ENTRA</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h3 id="welcome"></h3>

<div id="admin"></div>

<input id="buyin" type="number" placeholder="Buy-in">
<input id="cashout" type="number" placeholder="Cashout">

<button class="green" onclick="addHand()">INVIA MANO</button>

</div>

<div class="card">
<h3>🏆 CLASSIFICA LIVE</h3>
<div id="board"></div>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  databaseURL: "https://console.firebase.google.com/u/0/project/poker-507aa/database/poker-507aa-default-rtdb/data/~2F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let player = null;
let locked = false;
let data = {};

/* LOGIN */
function login(){

  player = document.getElementById("name").value.trim();
  if(!player) return;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("welcome").innerText =
    "👤 " + player;

  if(player === "Jonny"){
    document.getElementById("admin").innerHTML =
      `<button class="red" onclick="toggleLock()">BLOCCA TAVOLO</button>`;
  }

  listen();
}

/* LOCK */
function toggleLock(){
  locked = !locked;
}

/* ADD HAND */
function addHand(){

  if(locked){
    alert("TAVOLO CHIUSO");
    return;
  }

  const buyin = Number(document.getElementById("buyin").value);
  const cashout = Number(document.getElementById("cashout").value);

  db.ref("casino").push({
    player,
    buyin,
    cashout
  });
}

/* LIVE SYNC */
function listen(){

  db.ref("casino").on("value", snap => {

    data = snap.val() || {};
    render();

  });

}

/* CLASSIFICA */
function render(){

  const p = {};

  Object.values(data).forEach(r=>{

    if(!p[r.player]){
      p[r.player]={buyin:0,cashout:0,partite:0};
    }

    p[r.player].buyin += r.buyin;
    p[r.player].cashout += r.cashout;
    p[r.player].partite++;
  });

  const rank = Object.keys(p).map(n=>{

    const x = p[n];
    const profit = x.cashout - x.buyin;
    const roi = x.buyin ? (profit/x.buyin)*100 : 0;

    return {name:n,profit,roi};
  }).sort((a,b)=>b.roi-a.roi);

  let html = `
  <table>
    <tr>
      <th>POS</th>
      <th>PLAYER</th>
      <th>ROI</th>
      <th>PROFIT</th>
    </tr>
  `;

  rank.forEach((r,i)=>{
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${r.name}</td>
        <td>${r.roi.toFixed(2)}%</td>
        <td>${r.profit.toFixed(2)}€</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

</script>

</body>
</html>
