<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Casino Poker Live</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle, #0b3d2e, #061b14);
  color:white;
}

.header{
  text-align:center;
  padding:20px;
  font-size:28px;
  color:#00ff99;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#123f30;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:5px;
}

button{
  cursor:pointer;
}

.green{background:#00ff99;}
.red{background:#ff3b3b;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #1f5c45;
  padding:8px;
  text-align:center;
}

th{
  background:#0f2f22;
  color:#00ff99;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="header">🃏 CASINO LIVE POKER</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>🎲 Login Tavolo</h3>
  <input id="playerName" placeholder="Inserisci nome">
  <button class="green" onclick="login()">ENTRA</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="card">
<h3 id="welcome"></h3>

<div id="adminPanel"></div>

<input id="buyin" type="number" placeholder="Buy-in">
<input id="cashout" type="number" placeholder="Cashout">

<button class="green" onclick="add()">INVIA MANO</button>

</div>

<div class="card">
<h3>🏆 CLASSIFICA LIVE</h3>
<div id="board">Caricamento...</div>
</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  databaseURL: "https://console.firebase.google.com/u/0/project/poker-507aa/database/poker-507aa-default-rtdb/data/~2F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let locked = false;
let player = null;

/* LOGIN */
function login(){

  const name = document.getElementById("playerName").value.trim();
  if(!name) return;

  player = name;
  localStorage.setItem("player", name);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("welcome").innerText =
    "👤 Giocatore: " + name;

  if(name === "Jonny"){
    document.getElementById("adminPanel").innerHTML =
      `<button class="red" onclick="toggleLock()">BLOCCA / SBLOCCA INSERIMENTI</button>`;
  }

  listen();
}

/* LOCK ADMIN */
function toggleLock(){
  locked = !locked;
}

/* ADD MANO */
function add(){

  if(locked){
    alert("INSERIMENTI BLOCCATI");
    return;
  }

  const buyin = Number(document.getElementById("buyin").value);
  const cashout = Number(document.getElementById("cashout").value);

  db.ref("poker").push({
    nome: player,
    buyin,
    cashout
  });
}

/* LISTEN FIREBASE */
function listen(){

  db.ref("poker").on("value", snapshot => {

    data = snapshot.val() || {};
    render();

  });

}

/* CLASSIFICA */
function render(){

  const players = {};

  Object.values(data).forEach(r=>{

    if(!players[r.nome]){
      players[r.nome]={buyin:0,cashout:0,partite:0};
    }

    players[r.nome].buyin += r.buyin;
    players[r.nome].cashout += r.cashout;
    players[r.nome].partite++;
  });

  const ranking = Object.keys(players)
    .map(n=>{

      const p = players[n];
      const profit = p.cashout - p.buyin;
      const roi = p.buyin ? (profit/p.buyin)*100 : 0;

      return {nome:n,profit,roi,partite:p.partite};
    })
    .sort((a,b)=>b.roi-a.roi);

  let html = `
  <table>
    <tr>
      <th>POS</th>
      <th>PLAYER</th>
      <th>ROI</th>
      <th>PROFIT</th>
    </tr>
  `;

  ranking.forEach((p,i)=>{
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${p.nome}</td>
        <td>${p.roi.toFixed(2)}%</td>
        <td>${p.profit.toFixed(2)}€</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

/* AUTO LOGIN */
window.onload = function(){
  const saved = localStorage.getItem("player");
  if(saved){
    document.getElementById("playerName").value = saved;
  }
}

</script>

</body>
</html>
